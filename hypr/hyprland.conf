autogenerated = 0 


# █▀▄▀█ █▀█ █▄░█ █ ▀█▀ █▀█ █▀█
# █░▀░█ █▄█ █░▀█ █ ░█░ █▄█ █▀▄
monitor=,preferred,auto,auto
env = XCURSOR_SIZE,24


# █ █▄░█ █▀█ █░█ ▀█▀
# █ █░▀█ █▀▀ █▄█ ░█░
input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


# █▀▀ █▀▀ █▄░█ █▀▀ █▀█ ▄▀█ █░░
# █▄█ ██▄ █░▀█ ██▄ █▀▄ █▀█ █▄▄
general {
    gaps_in = 3
    gaps_out = 8
    border_size = 3
    col.active_border = rgba(11101600)
    col.inactive_border = rgba(11101600)

    layout = dwindle
}


# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█ ░█░ █ █▄█ █░▀█
decoration {
    #rounding
    rounding = 10
    #blur
    #blur = yes
    #blur_size = 4
    #blur_passes = 1
    #blur_new_optimizations = on
    #blurs = gtk-layer-shell
    #shadow
    drop_shadow = yes
    shadow_range = 15
    shadow_render_power = 4
    col.shadow = rgba(000000ff)
    col.shadow_inactive = rgba(00000000)
    shadow_offset = [-100, -100]

    #inactive_opacity = 0.9
    #dim_inactive = true
}
 

# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, default, slide 
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

#windowsRuls
windowrule=float,title:^(foot_litle)$
windowrule=size 800 500,title:^(foot_litle)$
windowrule=move 440 270,title:^(foot_litle)$
chmod +x gamemode.sh
windowrule=float,title:^(foot_is_cava)$
windowrule=size 800 500,title:^(foot_is_cava)$
windowrule=move 50 120,title:^(foot_is_cava)$

windowrule=float,title:^(foot_neofetch)$
windowrule=size 800 500,title:^(foot_neofetch)$
windowrule=move 830 450,title:^(foot_neofetch)$

#windowrule=float,title:^(foot_cmatrix)$

windowrule=float,title:^(foot_is_big)$
windowrule=size 1460 760,title:^(foot_is_big)$
windowrule=move 115 160,title:^(foot_is_big)$

windowrule = float, Rofi
windowrule = noborder, Rofi



# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█
dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}
master {
    new_is_master = true
}
gestures {
    workspace_swipe = off
}
device:epic-mouse-v1 {
    sensitivity = -0.5
}cd .config/swaylock


# █▀▀ ▀▄▀ █▀▀ █▀▀
# ██▄ █░█ ██▄ █▄▄
exec-once = swww init
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swww img /home/kirill/.config/hypr/wallpapers/extinct-volcano.jpg
exec-once = dunst
exec-once = waybar
exec-once = telegram-desktop -startintray
exec-once = element-desktop --hidden
#exec-once = easyeffects --gapplication-service
exec-once = foot --server --log-no-syslog --log-level=warning
exec-once = swww img /home/kirill/.config/hypr/wallpapers/extinct-volcano.jpg


$mainMod = SUPER


# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀▄▀█ ▄▀█ █▄░█ ▄▀█ █▀▀ █▀▄▀█ █▀▀ █▄░█ ▀█▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █░▀░█ █▀█ █░▀█ █▀█ █▄█ █░▀░█ ██▄ █░▀█ ░█░
bind = $mainModSHIFT, Q, killactive,
bind = $mainModSHIFT, M, exit,
bind = $mainModSHIFT, C, pseudo,
bind = $mainModSHIFT, Z, togglesplit,
bind = $mainModSHIFT, X, togglefloating,


# █▄▀ █▀▀ █▄█ █▄▄ █ █▄░█ █▀▄
# █░█ ██▄ ░█░ █▄█ █ █░▀█ █▄▀
# #apps
bind = $mainModSHIFT, RETURN, exec, footclient
bind = ALT, RETURN, exec, footclient --title=foot_litle
bind = $mainMod, RETURN, exec, footclient --title=foot_is_big
bind = ALT, Q, exec, steam
bind = ALT, W, exec, firefox
bind = ALT, F, exec, nautilus
bind = ALT, E, exec, element-desktop
bind = ALT, R, exec, telegram-desktop
bind = ALT, S, exec, sh $HOME/.config/rofi/bin/screenshot
bind = ALT, B, exec, tor-browser
#fun
bind = CTRL, Escape, exec, python ~/.config/hypr/scripts/wall.py
bind = CTRL,1,exec, footclient --title=foot_is_big --hold cmatrix
bind = CTRL,2,exec, footclient  --title=foot_is_cava --hold cava
bind = CTRL,3,exec, footclient  --title=foot_neofetch --hold neofetch
#chmod +x ggamemode.sh
bind = SUPER,F1,exec, ~/.config/hypr/gamemode.sh 
bind = $mainMod, V, exec, python ~/.config/hypr/scripts/wall_wipe.py
#fullscreen
bind = SUPER,F,fullscreen,0
bind = SUPERSHIFT,F,fullscreen,1
#screenshots
bind =  ,print,exec, grimshot copy
bind = SUPER,print,exec, grimshot copy area

#other
#bind = ALT, D ,exec,wofi --show drun -o
bind = ALT, D, exec, sh $HOME/.config/rofi/bin/launcher
bind = $mainModSHIFT, P, exec, sh $HOME/.config/rofi/bin/powermenu
bind = $mainMod, L, exec, swaylock


# █▀▀ █▀█ █▀▀ █░█ █▀
# █▀░ █▄█ █▄▄ █▄█ ▄█
bind = ALT, H, movefocus, l
bind = ALT, L, movefocus, r
bind = ALT, K, movefocus, u
bind = ALT, J, movefocus, d


# █▀ █░█░█ █ ▀█▀ █▀▀ █░█
# ▄█ ▀▄▀▄▀ █ ░█░ █▄▄ █▀█
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# █▀▄▀█ █▀█ █░█ █▀▀
# █░▀░█ █▄█ ▀▄▀ ██▄
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# █▀▄▀█ █▀█ █░█ █▀ █▀▀   █▄▄ █ █▄░█ █▀▄ █ █▄░█ █▀▀
# █░▀░█ █▄█ █▄█ ▄█ ██▄   █▄█ █ █░▀█ █▄▀ █ █░▀█ █▄█
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# █▀█ █▀▀ █▀ █ ▀█ █▀▀
# █▀▄ ██▄ ▄█ █ █▄ ██▄
bind = SUPER CTRL, left, resizeactive, -20 0
bind = SUPER CTRL, right, resizeactive, 20 0
bind = SUPER CTRL, up, resizeactive, 0 -20
bind = SUPER CTRL, down, resizeactive, 0 20


# █▀▄▀█ █░█ █░░ ▀█▀ █ █▀▄▀█ █▀▀ █▀▄ █ ▄▀█
# █░▀░█ █▄█ █▄▄ ░█░ █ █░▀░█ ██▄ █▄▀ █ █▀█
bind =  ,XF86AudioRaiseVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind =  ,XF86AudioLowerVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bind =  ,XF86AudioMute,exec,wpctl set-mute @DEFAULT_SINK@ toggle
bind =  ,F4,exec,wpctl set-mute @DEFAULT_SOURCE@ toggle
bind =  ,XF86AudioPlay,exec,playerctl play-pause
bind =  ,XF86AudioNext,exec,playerctl next
bind =  ,XF86AudioPrev,exec,playerctl previous
bind =  ,XF86AudioStop,exec,playerctl stop

